<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejemplo Flexbox Semántico</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* HEADER */
        header {
            background: #333;
            color: white;
            padding: 1rem;
        }

        nav ul {
            display: flex;
            list-style: none;
            padding: 0;
            margin: 0;
            justify-content: space-around; 
        }

        nav a {
            color: white;
            text-decoration: none;
        }

        main {
            display: flex;
            min-height: 70vh;
        }

        aside {
            background: #f4f4f4;
            padding: 1rem;
            width: 25%;
        }

        section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            padding: 1rem;
            width: 75%;
        }

        article {
            background: #e3e3e3;
            padding: 1rem;
            flex-grow: 1;
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 1rem;
        }

    </style>
</head>
<body>

    <header>
        <h1>Mi Sitio Web</h1>
        <nav>
            <ul>
                <li><a href="#">Inicio</a></li>
                <li><a href="#">Servicios</a></li>
                <li><a href="#">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <aside>
            <h2>Sidebar</h2>
            <p>Contenido lateral</p>
        </aside>

        <section>
            <article>
                <h2>Artículo 1</h2>
                <p>Contenido del artículo 1</p>
            </article>

            <article>
                <h2>Artículo 2</h2>
                <p>Contenido del artículo 2</p>
            </article>
        </section>
    </main>

    <footer>
        <p>© 2026 Mi Web</p>
    </footer>

</body>
</html>
